<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>臺灣旅人登陸計劃 - 您的專屬客製旅遊</title>
    <!-- 引入 Tailwind CSS 讓介面大氣漂亮 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .video-container { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800">

    <!-- 導覽列：左上 Logo 與名字 -->
    <nav class="fixed w-full bg-white/90 backdrop-blur shadow-sm z-50 px-6 py-3 flex justify-between items-center">
        <div class="flex items-center space-x-3">
            <img src="tt.jpg" alt="Logo" class="h-10"> <!-- 放上你設計的陸字Logo -->
            <span class="text-xl font-bold text-blue-900">臺灣旅人登陸計劃</span>
        </div>
        <a href="#booking" class="bg-orange-500 hover:bg-orange-600 text-white px-6 py-2 rounded-full font-bold transition">立即預約</a>
    </nav>

    <!-- 影片區：自動播放與預覽 -->
    <section class="pt-20">
        <div class="video-container shadow-2xl">
            <!-- 替換成你的 YouTube ID，設定 mute=1 以便自動播放 -->
            <iframe src="https://www.youtube.com/embed/你的影片ID?autoplay=1&mute=1&loop=1&playlist=你的影片ID" 
                    frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>
        </div>
    </section>

    <!-- 宣傳文案區 -->
    <section class="max-w-4xl mx-auto px-6 py-16 text-center">
        <h2 class="text-4xl font-extrabold text-blue-900 mb-6">不只是旅行，是一場完美的「登陸」</h2>
        <p class="text-lg leading-relaxed text-gray-600 mb-8">
            厭倦了趕路的遊覽車、不想再為支付寶和打車軟體煩惱？<br>
            我們由 **AI 系專業團隊** 領軍，為您掃除一切數位障礙。從哈爾濱的冰雪地景到長沙的人間煙火，<br>
            我們提供 100% 的客製化行程規劃。您只需帶上行李，剩下的交給我們。
        </p>
        <div class="grid md:grid-cols-3 gap-8 text-left italic text-blue-800">
            <div class="p-4 border-l-4 border-orange-400 bg-orange-50">✓ 專業在地軟體支援</div>
            <div class="p-4 border-l-4 border-orange-400 bg-orange-50">✓ 私人專車接送服務</div>
            <div class="p-4 border-l-4 border-orange-400 bg-orange-50">✓ 隱藏版在地美食清單</div>
        </div>
    </section>

    <!-- 費用與訂購區 -->
    <section id="booking" class="bg-blue-900 py-16 text-white text-center">
        <div class="max-w-2xl mx-auto px-6">
            <h3 class="text-2xl mb-2">基礎服務費用</h3>
            <div class="text-6xl font-bold mb-6">NT$ 12,800 <span class="text-lg font-normal">起</span></div>
            <p class="mb-10 text-blue-200">費用包含：數位工具實名協助、全程路線規劃顧問、專屬司導對接。</p>
            
            <!-- 聯絡表單：溝通客製化需求 -->
            <div class="bg-white p-8 rounded-xl text-gray-900 text-left shadow-xl">
                <h4 class="text-xl font-bold mb-4">告訴我們您的夢想行程</h4>
                <form action="#" method="POST" class="space-y-4">
                    <input type="text" placeholder="您的姓名" class="w-full p-3 border rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
                    <input type="email" placeholder="電子郵件" class="w-full p-3 border rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
                    <textarea placeholder="您想去的地點？有什麼特殊要求？(例如：不吃辣、帶小孩、想去長沙喝茶顏悅色)" rows="4" class="w-full p-3 border rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"></textarea>
                    <button type="submit" class="w-full bg-orange-500 text-white font-bold py-3 rounded-md hover:bg-orange-600 transition">發送登陸需求</button>
                </form>
            </div>
        </div>
    </section>

    <footer class="py-10 text-center text-gray-400 text-sm">
        © 2026 臺灣旅人登陸計劃 - 淡江大學 AI-1A 第五組
    </footer>

</body>
</html>
